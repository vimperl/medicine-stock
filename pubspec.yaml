name: medicine_stock
description: "Medicine stock tracking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0-57.0.dev

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.2

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Localization & dates
  intl: any

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Backup
  share_plus: ^10.0.2
  file_picker: ^8.1.2

  # Google Drive backup
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
